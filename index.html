<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Drift and Flow — A Sleep Game</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; cursor: none; touch-action: none; -webkit-user-select: none; user-select: none; }
  canvas { display: block; position: fixed; top: 0; left: 0; }
  #start-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: radial-gradient(ellipse at 50% 60%, #071428 0%, #000 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 100; transition: opacity 3s ease-out;
    font-family: 'Georgia', serif;
  }
  #start-overlay h1 {
    font-size: clamp(2em, 8vw, 3.5em); font-weight: 300; letter-spacing: 0.3em;
    margin-bottom: 0.3em; opacity: 0;
    animation: fadeIn 3s ease-out 0.5s forwards;
    color: rgba(140, 190, 240, 0.55);
    text-transform: uppercase;
  }
  #start-overlay .sub {
    font-size: clamp(0.9em, 3vw, 1.2em); letter-spacing: 0.2em; opacity: 0;
    animation: fadeIn 3s ease-out 2s forwards;
    color: rgba(120, 170, 220, 0.3);
    font-style: italic;
  }
  #start-overlay .tap-hint {
    margin-top: 3em; font-size: clamp(0.8em, 2.5vw, 1em); opacity: 0;
    animation: fadeIn 2s ease-out 3.5s forwards, pulse 4s ease-in-out 3.5s infinite;
    color: rgba(100, 160, 220, 0.35);
    padding: 0.8em 2em;
    border: 1px solid rgba(100, 160, 220, 0.15);
    border-radius: 50px;
  }
  #start-overlay .note {
    margin-top: 2em; font-size: 0.75em; opacity: 0;
    animation: fadeIn 2s ease-out 5s forwards;
    color: rgba(100, 150, 200, 0.2);
  }
  @keyframes fadeIn { to { opacity: 1; } }
  @keyframes pulse { 0%,100% { opacity: 0.35; } 50% { opacity: 0.7; } }

  #sound-btn {
    position: fixed; bottom: 20px; right: 20px; z-index: 50;
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
    color: rgba(180,200,230,0.5); font-size: 1.4em; width: 50px; height: 50px;
    border-radius: 50%; cursor: pointer; display: none;
    font-family: sans-serif; transition: all 0.5s;
  }
  #sound-btn:active { background: rgba(255,255,255,0.1); }
</style>
</head>
<body>
<div id="start-overlay">
  <h1>Drift and Flow</h1>
  <p class="sub">a place to let go</p>
  <p class="tap-hint">tap to begin</p>
  <p class="note">🎧 turn volume up &middot; headphones recommended</p>
</div>
<button id="sound-btn">🔊</button>
<canvas id="c"></canvas>
<script>
// ═══════════════════════════════════════════
//  DRIFT AND FLOW — A Sleep Game
// ═══════════════════════════════════════════

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
window.addEventListener('resize', resize);
resize();

// ─── STATE ───
let mouse = { x: -1000, y: -1000, active: false };
let mouseTrail = [];
let particles = [];
let jellyfish = [];
let ripples = [];
let startTime = 0, lastInteraction = 0;
let breathPhase = 0, breathCycle = 6, globalDim = 1;
let started = false;
let audioCtx = null, audioStarted = false;

// ═══════════════════════════════════════════
//  AUDIO — FIXED FOR MOBILE
// ═══════════════════════════════════════════
function ensureAudio() {
  if (audioStarted) return;
  try {
    // Create fresh context on user gesture
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    // CRITICAL: resume for mobile browsers
    if (audioCtx.state === 'suspended') {
      audioCtx.resume();
    }
    buildAudio();
    audioStarted = true;
    document.getElementById('sound-btn').style.display = 'block';
    console.log('Audio started, state:', audioCtx.state);
  } catch(e) {
    console.log('Audio error:', e);
  }
}

function buildAudio() {
  const ac = audioCtx;

  // Master output — LOUD
  const master = ac.createGain();
  master.gain.setValueAtTime(0.001, ac.currentTime);
  master.gain.exponentialRampToValueAtTime(0.75, ac.currentTime + 4);
  master.connect(ac.destination);

  // Compressor for warmth
  const comp = ac.createDynamicsCompressor();
  comp.threshold.value = -15;
  comp.ratio.value = 3;
  comp.knee.value = 10;
  comp.connect(master);

  // Delay-based reverb
  const reverbBus = ac.createGain();
  reverbBus.gain.value = 0.25;
  reverbBus.connect(comp);
  const delays = [0.12, 0.27, 0.41, 0.58];
  const revInputs = [];
  delays.forEach(t => {
    const d = ac.createDelay(1);
    d.delayTime.value = t;
    const fb = ac.createGain();
    fb.gain.value = 0.15;
    const f = ac.createBiquadFilter();
    f.type = 'lowpass';
    f.frequency.value = 700;
    d.connect(f); f.connect(fb); fb.connect(d); f.connect(reverbBus);
    revInputs.push(d);
  });
  function toReverb(node) {
    const s = ac.createGain(); s.gain.value = 0.2;
    node.connect(s);
    revInputs.forEach(r => s.connect(r));
  }

  // ─── DRONES (lush pad) ───
  function drone(freq, vol, type, detune, cutoff) {
    const o = ac.createOscillator();
    const g = ac.createGain();
    const f = ac.createBiquadFilter();
    o.type = type || 'sine';
    o.frequency.value = freq;
    o.detune.value = detune || 0;
    f.type = 'lowpass';
    f.frequency.value = cutoff || 500;
    f.Q.value = 0.5;
    g.gain.value = vol;
    o.connect(f); f.connect(g); g.connect(comp);
    toReverb(g);
    o.start();
    // slow wobble
    const lfo = ac.createOscillator();
    const lg = ac.createGain();
    lfo.frequency.value = 0.015 + Math.random() * 0.03;
    lg.gain.value = 120;
    lfo.connect(lg); lg.connect(f.frequency);
    lfo.start();
  }

  // Rich A-minor ambient chord
  drone(41.2, 0.3, 'sine', 0, 300);     // E1 sub
  drone(55, 0.35, 'sine', 0, 400);      // A1
  drone(55.3, 0.2, 'sine', 7, 380);     // A1 chorus
  drone(82.4, 0.25, 'sine', -4, 500);   // E2
  drone(110, 0.2, 'sine', 3, 450);      // A2
  drone(130.8, 0.15, 'triangle', -3, 420); // C3
  drone(164.8, 0.1, 'sine', 5, 380);    // E3
  drone(220, 0.06, 'sine', -2, 320);    // A3

  // ─── OCEAN (brown noise) ───
  const bufLen = ac.sampleRate * 8;
  const noiseBuf = ac.createBuffer(2, bufLen, ac.sampleRate);
  for (let ch = 0; ch < 2; ch++) {
    const d = noiseBuf.getChannelData(ch);
    let v = 0;
    for (let i = 0; i < bufLen; i++) {
      v = (v + (Math.random() * 2 - 1) * 0.02) * 0.998;
      d[i] = v * 25;
    }
  }
  const noise = ac.createBufferSource();
  noise.buffer = noiseBuf; noise.loop = true;
  const nf = ac.createBiquadFilter();
  nf.type = 'lowpass'; nf.frequency.value = 300;
  const ng = ac.createGain(); ng.gain.value = 0.3;
  noise.connect(nf); nf.connect(ng); ng.connect(comp);
  noise.start();
  // wave rhythm
  const waveLfo = ac.createOscillator();
  const waveG = ac.createGain();
  waveLfo.frequency.value = 0.06;
  waveG.gain.value = 0.12;
  waveLfo.connect(waveG); waveG.connect(ng.gain);
  waveLfo.start();

  // ─── CHIMES (gentle random tones) ───
  function chime() {
    if (!audioStarted) return;
    const notes = [261.6, 329.6, 392, 440, 523.3, 659.3, 783.9];
    const freq = notes[Math.floor(Math.random() * notes.length)];
    const o = ac.createOscillator();
    const g = ac.createGain();
    const f = ac.createBiquadFilter();
    o.type = 'sine';
    o.frequency.value = freq;
    f.type = 'lowpass'; f.frequency.value = 1200;
    g.gain.setValueAtTime(0, ac.currentTime);
    g.gain.linearRampToValueAtTime(0.06 * globalDim, ac.currentTime + 1.5);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 8);
    o.connect(f); f.connect(g); g.connect(comp);
    toReverb(g);
    o.start(); o.stop(ac.currentTime + 9);
    setTimeout(chime, 6000 + Math.random() * 18000);
  }
  setTimeout(chime, 3000);

  // ─── BINAURAL BEATS (delta ~2Hz) ───
  const bL = ac.createOscillator();
  const bR = ac.createOscillator();
  const bGL = ac.createGain();
  const bGR = ac.createGain();
  const merger = ac.createChannelMerger(2);
  bL.frequency.value = 100; bR.frequency.value = 102;
  bGL.gain.value = 0.1; bGR.gain.value = 0.1;
  bL.connect(bGL); bR.connect(bGR);
  bGL.connect(merger, 0, 0); bGR.connect(merger, 0, 1);
  merger.connect(master);
  bL.start(); bR.start();

  // ─── SINGING BOWL (long resonant tone) ───
  function singingBowl() {
    if (!audioStarted) return;
    const freq = [174, 285, 396][Math.floor(Math.random() * 3)];
    const o1 = ac.createOscillator();
    const o2 = ac.createOscillator();
    const g = ac.createGain();
    o1.type = 'sine'; o1.frequency.value = freq;
    o2.type = 'sine'; o2.frequency.value = freq * 2.01; // slight harmonic
    const g2 = ac.createGain(); g2.gain.value = 0.3;
    g.gain.setValueAtTime(0, ac.currentTime);
    g.gain.linearRampToValueAtTime(0.04 * globalDim, ac.currentTime + 3);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 15);
    o1.connect(g); o2.connect(g2); g2.connect(g); g.connect(comp);
    toReverb(g);
    o1.start(); o2.start();
    o1.stop(ac.currentTime + 16); o2.stop(ac.currentTime + 16);
    setTimeout(singingBowl, 20000 + Math.random() * 30000);
  }
  setTimeout(singingBowl, 10000);

  // ─── WHALE SONG (frequency sweeps + harmonics) ───
  // ─── WHALE SONG — designed for phone speakers (200Hz+) ───
  // Phone speakers can't reproduce below ~200Hz, so we use
  // higher frequencies with pitch sweeps to create the whale effect
  function whaleSong() {
    if (!audioStarted) return;
    const t0 = ac.currentTime;
    const duration = 4 + Math.random() * 5;

    // Whale song has its own gain bus so it cuts through
    const whaleBus = ac.createGain();
    whaleBus.gain.value = 1.0;
    whaleBus.connect(ac.destination); // bypass compressor — direct to speakers

    // Main cry — HIGH enough for phone speakers (250-500Hz range)
    const o1 = ac.createOscillator();
    const g1 = ac.createGain();
    o1.type = 'sine';
    const startFreq = 250 + Math.random() * 150;
    const peakFreq = startFreq + (Math.random() > 0.5 ? 1 : -1) * (80 + Math.random() * 120);
    o1.frequency.setValueAtTime(startFreq, t0);
    o1.frequency.linearRampToValueAtTime(peakFreq, t0 + duration * 0.35);
    o1.frequency.linearRampToValueAtTime(startFreq * 0.85, t0 + duration * 0.7);
    o1.frequency.linearRampToValueAtTime(startFreq * 0.6, t0 + duration);
    g1.gain.setValueAtTime(0.001, t0);
    g1.gain.linearRampToValueAtTime(0.35, t0 + 1);
    g1.gain.setValueAtTime(0.35, t0 + duration - 2);
    g1.gain.linearRampToValueAtTime(0.001, t0 + duration);
    o1.connect(g1); g1.connect(whaleBus);
    toReverb(g1);

    // Eerie high harmonic (500-1000Hz — very audible on phones)
    const o2 = ac.createOscillator();
    const g2 = ac.createGain();
    o2.type = 'sine';
    o2.frequency.setValueAtTime(startFreq * 2, t0);
    o2.frequency.linearRampToValueAtTime(peakFreq * 2.2, t0 + duration * 0.3);
    o2.frequency.linearRampToValueAtTime(startFreq * 1.5, t0 + duration * 0.65);
    o2.frequency.linearRampToValueAtTime(startFreq * 1.2, t0 + duration);
    g2.gain.setValueAtTime(0.001, t0);
    g2.gain.linearRampToValueAtTime(0.18, t0 + 1.5);
    g2.gain.linearRampToValueAtTime(0.001, t0 + duration - 0.5);
    o2.connect(g2); g2.connect(whaleBus);
    toReverb(g2);

    // Wailing overtone (800-1500Hz — the haunting part)
    const o3 = ac.createOscillator();
    const g3 = ac.createGain();
    o3.type = 'sine';
    o3.frequency.setValueAtTime(startFreq * 3.5, t0 + 0.5);
    o3.frequency.linearRampToValueAtTime(peakFreq * 3, t0 + duration * 0.4);
    o3.frequency.linearRampToValueAtTime(startFreq * 2.5, t0 + duration);
    g3.gain.setValueAtTime(0.001, t0);
    g3.gain.linearRampToValueAtTime(0.08, t0 + 2);
    g3.gain.linearRampToValueAtTime(0.001, t0 + duration - 1);
    o3.connect(g3); g3.connect(whaleBus);
    toReverb(g3);

    // Breathy texture — filtered noise burst
    const nLen = ac.sampleRate * duration;
    const nBuf = ac.createBuffer(1, nLen, ac.sampleRate);
    const nData = nBuf.getChannelData(0);
    let nv = 0;
    for (let i = 0; i < nLen; i++) {
      nv = (nv + (Math.random() * 2 - 1) * 0.03) * 0.997;
      nData[i] = nv * 15;
    }
    const nSrc = ac.createBufferSource();
    nSrc.buffer = nBuf;
    const nFilt = ac.createBiquadFilter();
    nFilt.type = 'bandpass';
    nFilt.frequency.value = startFreq * 1.5;
    nFilt.Q.value = 5;
    const nGain = ac.createGain();
    nGain.gain.setValueAtTime(0.001, t0);
    nGain.gain.linearRampToValueAtTime(0.12, t0 + 1);
    nGain.gain.linearRampToValueAtTime(0.001, t0 + duration);
    nSrc.connect(nFilt); nFilt.connect(nGain); nGain.connect(whaleBus);

    o1.start(t0); o2.start(t0); o3.start(t0); nSrc.start(t0);
    o1.stop(t0 + duration + 0.5); o2.stop(t0 + duration + 0.5);
    o3.stop(t0 + duration + 0.5); nSrc.stop(t0 + duration + 0.5);

    // Clean up whale bus after sound ends
    setTimeout(() => { try { whaleBus.disconnect(); } catch(e) {} }, (duration + 2) * 1000);

    // Response call
    if (Math.random() > 0.4) {
      setTimeout(whaleSong, (duration + 2 + Math.random() * 4) * 1000);
    }
    // Next cycle
    setTimeout(whaleSong, (duration + 8 + Math.random() * 15) * 1000);
  }
  // First whale call — almost immediately after tap
  setTimeout(whaleSong, 1500);

  // Sound toggle button
  let muted = false;
  document.getElementById('sound-btn').addEventListener('click', (e) => {
    e.stopPropagation();
    muted = !muted;
    master.gain.linearRampToValueAtTime(muted ? 0.001 : 0.75, ac.currentTime + 0.5);
    document.getElementById('sound-btn').textContent = muted ? '🔇' : '🔊';
  });
}

// ═══════════════════════════════════════════
//  JELLYFISH — bigger, glowing, trance-like
// ═══════════════════════════════════════════
class Jellyfish {
  constructor() { this.reset(true); }
  reset(init) {
    this.x = Math.random() * W;
    this.y = init ? H * 0.3 + Math.random() * H * 0.6 : H + 150;
    this.size = 40 + Math.random() * 55; // BIGGER
    this.vx = (Math.random() - 0.5) * 0.1;
    this.vy = -(0.06 + Math.random() * 0.12);
    this.pulsePhase = Math.random() * Math.PI * 2;
    this.pulseSpeed = 0.012 + Math.random() * 0.008;
    this.tentacles = 6 + Math.floor(Math.random() * 5);
    this.hue = 170 + Math.random() * 80; // cyan → violet
    this.saturation = 70 + Math.random() * 20;
    this.alpha = 0.25 + Math.random() * 0.3;
    this.glowSize = 2.5 + Math.random();
    this.wobble = Math.random() * Math.PI * 2;
    this.wobbleSpeed = 0.005 + Math.random() * 0.005;
    this.innerPulseOffset = Math.random() * Math.PI;
    this.fadeAlpha = 1;       // 1 = fully visible, fades toward 0 when touched
    this.fading = false;
    this.respawnDelay = 0;
  }
  update() {
    // If fully faded, wait then respawn
    if (this.fadeAlpha <= 0.01 && this.fading) {
      this.respawnDelay++;
      if (this.respawnDelay > 180) { // ~3 seconds at 60fps
        this.reset(false);
        this.fadeAlpha = 0.01;
        this.fading = false;
      }
      return;
    }
    // Fade back in when respawning
    if (!this.fading && this.fadeAlpha < 1) {
      this.fadeAlpha += 0.005;
      if (this.fadeAlpha > 1) this.fadeAlpha = 1;
    }

    this.wobble += this.wobbleSpeed;
    this.x += this.vx + Math.sin(this.wobble) * 0.25;
    this.y += this.vy + Math.cos(this.wobble * 0.7) * 0.1;
    this.pulsePhase += this.pulseSpeed;
    if (mouse.active) {
      const dx = this.x - mouse.x, dy = this.y - mouse.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      // Touch dissolve — finger within the jellyfish body
      if (dist < this.size * 1.2) {
        this.fading = true;
        this.fadeAlpha *= 0.94; // smooth dissolve
      }
      // Gentle push if nearby but not touching
      else if (dist < 250) {
        const f = (1 - dist / 250) * 0.25;
        this.vx += (dx / dist) * f;
        this.vy += (dy / dist) * f;
      }
    }
    this.vx *= 0.997; this.vy *= 0.997;
    this.vy = Math.min(this.vy, -0.02);
    if (this.y < -this.size * 4) this.reset(false);
    if (this.x < -150) this.x = W + 150;
    if (this.x > W + 150) this.x = -150;
  }
  draw() {
    const pulse = Math.sin(this.pulsePhase) * 0.5 + 0.5;
    const innerPulse = Math.sin(this.pulsePhase * 1.3 + this.innerPulseOffset) * 0.5 + 0.5;
    const s = this.size * (0.85 + pulse * 0.15);
    const a = this.alpha * globalDim * this.fadeAlpha;
    if (a < 0.008) return;

    ctx.save();
    ctx.translate(this.x, this.y);

    // BIG outer glow (trance effect)
    const glowR = s * this.glowSize;
    const glow = ctx.createRadialGradient(0, -s*0.1, 0, 0, -s*0.1, glowR);
    glow.addColorStop(0, `hsla(${this.hue}, ${this.saturation}%, 75%, ${a * 0.35 * (0.6 + pulse * 0.4)})`);
    glow.addColorStop(0.4, `hsla(${this.hue}, ${this.saturation}%, 55%, ${a * 0.1})`);
    glow.addColorStop(1, `hsla(${this.hue}, ${this.saturation}%, 40%, 0)`);
    ctx.beginPath();
    ctx.arc(0, -s*0.1, glowR, 0, Math.PI * 2);
    ctx.fillStyle = glow;
    ctx.fill();

    // Bell dome
    ctx.beginPath();
    ctx.ellipse(0, 0, s * 0.75, s * (0.5 + pulse * 0.08), 0, Math.PI, 0);
    ctx.quadraticCurveTo(s * 0.75, s * 0.18, s * 0.35, s * 0.32);
    ctx.quadraticCurveTo(0, s * (0.38 + pulse * 0.04), -s * 0.35, s * 0.32);
    ctx.quadraticCurveTo(-s * 0.75, s * 0.18, -s * 0.75, 0);
    ctx.closePath();
    const bellG = ctx.createRadialGradient(0, -s*0.15, s*0.05, 0, 0, s*0.8);
    bellG.addColorStop(0, `hsla(${this.hue}, 100%, 88%, ${a * 0.7})`);
    bellG.addColorStop(0.3, `hsla(${this.hue}, ${this.saturation}%, 65%, ${a * 0.4})`);
    bellG.addColorStop(0.7, `hsla(${this.hue}, ${this.saturation}%, 45%, ${a * 0.2})`);
    bellG.addColorStop(1, `hsla(${this.hue}, ${this.saturation-10}%, 30%, ${a * 0.05})`);
    ctx.fillStyle = bellG;
    ctx.fill();

    // Inner glow core (pulsing)
    ctx.beginPath();
    ctx.ellipse(0, -s*0.08, s*0.3, s*0.18, 0, 0, Math.PI*2);
    ctx.fillStyle = `hsla(${this.hue+10}, 100%, 92%, ${a * 0.4 * (0.4 + innerPulse * 0.6)})`;
    ctx.fill();

    // Second inner ring
    ctx.beginPath();
    ctx.ellipse(0, -s*0.05, s*0.15, s*0.1, 0, 0, Math.PI*2);
    ctx.fillStyle = `hsla(${this.hue+20}, 100%, 95%, ${a * 0.3 * pulse})`;
    ctx.fill();

    // Tentacles with bioluminescent dots
    for (let i = 0; i < this.tentacles; i++) {
      const tx = ((i / (this.tentacles - 1)) - 0.5) * s * 1.1;
      const tLen = s * (1.0 + Math.sin(this.pulsePhase + i) * 0.3);
      const w1 = Math.sin(this.pulsePhase * 0.8 + i * 0.9) * s * 0.18;
      const w2 = Math.sin(this.pulsePhase * 0.5 + i * 1.3) * s * 0.12;
      const w3 = Math.sin(this.pulsePhase * 0.3 + i * 0.6) * s * 0.08;

      ctx.beginPath();
      ctx.moveTo(tx, s * 0.28);
      ctx.bezierCurveTo(
        tx + w1, s * 0.28 + tLen * 0.33,
        tx + w1 + w2, s * 0.28 + tLen * 0.66,
        tx + w1 + w2 + w3, s * 0.28 + tLen
      );
      const tAlpha = a * 0.5 * (0.5 + pulse * 0.5);
      ctx.strokeStyle = `hsla(${this.hue}, 80%, 75%, ${tAlpha})`;
      ctx.lineWidth = 1.5;
      ctx.lineCap = 'round';
      ctx.stroke();

      // glowing dots along tentacles
      const dotCount = 3;
      for (let d = 0; d < dotCount; d++) {
        const t = (d + 1) / (dotCount + 1);
        const dotPhase = Math.sin(this.pulsePhase * 2 + i * 0.7 + d * 1.5) * 0.5 + 0.5;
        const dx2 = tx + (w1 * t) + (w2 * t * t);
        const dy2 = s * 0.28 + tLen * t;
        ctx.beginPath();
        ctx.arc(dx2, dy2, 2 + dotPhase * 1.5, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${this.hue+15}, 100%, 85%, ${a * 0.6 * dotPhase})`;
        ctx.fill();
        // dot glow
        ctx.beginPath();
        ctx.arc(dx2, dy2, 6 + dotPhase * 4, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${this.hue+15}, 100%, 80%, ${a * 0.1 * dotPhase})`;
        ctx.fill();
      }
    }

    ctx.restore();
  }
}

// ═══════════════════════════════════════════
//  PARTICLES
// ═══════════════════════════════════════════
class Particle {
  constructor() { this.reset(); }
  reset() {
    this.x = Math.random() * W; this.y = Math.random() * H;
    this.baseSize = 0.6 + Math.random() * 2.2;
    this.vx = (Math.random() - 0.5) * 0.1;
    this.vy = (Math.random() - 0.5) * 0.1 - 0.02;
    this.alpha = 0.08 + Math.random() * 0.3;
    this.baseAlpha = this.alpha;
    this.pulseOff = Math.random() * Math.PI * 2;
    this.hue = 190 + Math.random() * 50;
  }
  update(bv) {
    this.x += this.vx; this.y += this.vy;
    if (this.x < -20) this.x = W + 20; if (this.x > W + 20) this.x = -20;
    if (this.y < -20) this.y = H + 20; if (this.y > H + 20) this.y = -20;
    if (mouse.active) {
      const dx = mouse.x - this.x, dy = mouse.y - this.y;
      const dist = Math.sqrt(dx*dx+dy*dy);
      if (dist < 180) { const f = (1-dist/180)*0.005; this.vx += dx*f; this.vy += dy*f; }
    }
    this.vx *= 0.998; this.vy *= 0.998;
    const p = Math.sin(breathPhase + this.pulseOff) * 0.5 + 0.5;
    this.size = this.baseSize * (0.6 + p * 0.5 + bv * 0.2);
    this.alpha = this.baseAlpha * (0.3 + p * 0.7) * globalDim;
  }
  draw() {
    if (this.alpha < 0.005) return;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${this.hue}, 80%, 75%, ${this.alpha})`;
    ctx.shadowColor = `hsla(${this.hue}, 80%, 70%, ${this.alpha * 0.5})`;
    ctx.shadowBlur = this.size * 6;
    ctx.fill();
    ctx.shadowBlur = 0;
  }
}

// ═══════════════════════════════════════════
//  RIPPLES
// ═══════════════════════════════════════════
class Ripple {
  constructor(x,y) { this.x=x; this.y=y; this.r=3; this.maxR=90+Math.random()*50; this.a=0.35; this.spd=0.4+Math.random()*0.3; }
  update() { this.r += this.spd; this.a *= 0.983; return this.a > 0.003 && this.r < this.maxR; }
  draw() { const a=this.a*globalDim; if(a<0.003) return; ctx.beginPath(); ctx.arc(this.x,this.y,this.r,0,Math.PI*2); ctx.strokeStyle=`rgba(120,190,255,${a})`; ctx.lineWidth=1.5; ctx.stroke(); }
}

// ═══════════════════════════════════════════
//  FISH SHOALS (boid-like schooling)
// ═══════════════════════════════════════════
let fishShoals = [];
let trailPoints = []; // stores finger trail positions for fish to follow

class Fish {
  constructor(shoalIndex) {
    this.shoalIndex = shoalIndex;
    this.x = Math.random() * W;
    this.y = Math.random() * H;
    this.vx = (Math.random() - 0.5) * 0.3;
    this.vy = (Math.random() - 0.5) * 0.3;
    this.size = 3 + Math.random() * 3;
    this.tailPhase = Math.random() * Math.PI * 2;
    this.tailSpeed = 0.1 + Math.random() * 0.06;
    this.alpha = 0.35 + Math.random() * 0.25;
    this.activated = false;       // only follows trail after being touched
    this.trailTarget = 0;         // which trail point this fish is heading to
    this.activatedTimer = 0;      // how long the fish stays activated
  }
  update(shoal) {
    this.tailPhase += this.tailSpeed;
    const maxSpeed = this.activated ? 2.2 : 0.8;

    // ── Check if finger touches this fish's shoal to activate ──
    if (mouse.active && !this.activated) {
      const dx = mouse.x - this.x, dy = mouse.y - this.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 60) {
        // Activate entire shoal when any fish in it is touched
        for (const f of shoal) {
          f.activated = true;
          f.activatedTimer = 600 + Math.random() * 300; // ~10-15 seconds
          f.trailTarget = Math.floor(Math.random() * Math.max(1, trailPoints.length));
        }
      }
    }

    // ── Activated: follow the finger trail ──
    if (this.activated && trailPoints.length > 2) {
      this.activatedTimer--;
      // Pick a trail point to chase (spread fish along the trail)
      const idx = Math.min(this.trailTarget, trailPoints.length - 1);
      const tp = trailPoints[idx];
      if (tp) {
        const dx = tp.x - this.x, dy = tp.y - this.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist > 5) {
          const pull = Math.min(0.08, 0.5 / dist) * 2;
          this.vx += dx * pull;
          this.vy += dy * pull;
        }
        // Once close enough, advance to next trail point
        if (dist < 15 && this.trailTarget < trailPoints.length - 1) {
          this.trailTarget++;
        }
      }
      // Tail wags faster when following
      this.tailSpeed = 0.18 + Math.random() * 0.04;
      // Deactivate when timer runs out and trail is old
      if (this.activatedTimer <= 0) {
        this.activated = false;
        this.tailSpeed = 0.1 + Math.random() * 0.06;
      }
    }

    // ── Boid rules (cohesion, alignment, separation) ──
    let cx = 0, cy = 0, ax = 0, ay = 0, sx = 0, sy = 0;
    let neighbors = 0;
    for (const other of shoal) {
      if (other === this) continue;
      const dx = other.x - this.x, dy = other.y - this.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 80) {
        cx += other.x; cy += other.y;
        ax += other.vx; ay += other.vy;
        neighbors++;
        if (dist < 18) {
          sx -= dx / dist * 0.15;
          sy -= dy / dist * 0.15;
        }
      }
    }
    if (neighbors > 0) {
      cx = cx / neighbors; cy = cy / neighbors;
      this.vx += (cx - this.x) * (this.activated ? 0.001 : 0.004);
      this.vy += (cy - this.y) * (this.activated ? 0.001 : 0.004);
      this.vx += (ax / neighbors - this.vx) * 0.015;
      this.vy += (ay / neighbors - this.vy) * 0.015;
    }
    this.vx += sx; this.vy += sy;

    // ── Gentle idle wander (when not activated) ──
    if (!this.activated) {
      this.vx += (Math.random() - 0.5) * 0.03;
      this.vy += (Math.random() - 0.5) * 0.03;
    }

    // Speed limit
    const spd = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
    if (spd > maxSpeed) { this.vx = (this.vx / spd) * maxSpeed; this.vy = (this.vy / spd) * maxSpeed; }

    this.vx *= 0.993; this.vy *= 0.993;
    this.x += this.vx; this.y += this.vy;

    // Wrap edges
    const margin = 40;
    if (this.x < -margin) this.x = W + margin;
    if (this.x > W + margin) this.x = -margin;
    if (this.y < -margin) this.y = H + margin;
    if (this.y > H + margin) this.y = -margin;
  }
  draw() {
    const a = this.alpha * globalDim;
    if (a < 0.005) return;
    const angle = Math.atan2(this.vy, this.vx);
    const tailWag = Math.sin(this.tailPhase) * 0.4;
    const s = this.size;
    const hue = 195 + this.shoalIndex * 30;
    // Glow brighter when activated
    const glowBoost = this.activated ? 1.5 : 1;

    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(angle);

    // Body glow
    ctx.beginPath();
    ctx.arc(0, 0, s * 2.5, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${hue}, 80%, 70%, ${a * 0.07 * glowBoost})`;
    ctx.fill();

    // Body
    ctx.beginPath();
    ctx.ellipse(0, 0, s, s * 0.45, 0, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${hue}, 75%, ${70 + (this.activated ? 10 : 0)}%, ${a * 0.7})`;
    ctx.fill();

    // Tail
    ctx.beginPath();
    ctx.moveTo(-s * 0.6, 0);
    ctx.lineTo(-s * 1.6, s * 0.5 + tailWag * s * 0.3);
    ctx.lineTo(-s * 1.6, -s * 0.5 + tailWag * s * 0.3);
    ctx.closePath();
    ctx.fillStyle = `hsla(${hue}, 70%, 70%, ${a * 0.5})`;
    ctx.fill();

    // Eye
    ctx.beginPath();
    ctx.arc(s * 0.4, -s * 0.08, s * 0.12, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(190, 100%, 90%, ${a * 0.8})`;
    ctx.fill();

    ctx.restore();
  }
}

function initFish() {
  fishShoals = [];
  const shoalCount = 3;
  const fishPerShoal = 12;
  for (let s = 0; s < shoalCount; s++) {
    const shoal = [];
    const cx = Math.random() * W, cy = Math.random() * H;
    for (let i = 0; i < fishPerShoal; i++) {
      const f = new Fish(s);
      f.x = cx + (Math.random() - 0.5) * 100;
      f.y = cy + (Math.random() - 0.5) * 100;
      shoal.push(f);
    }
    fishShoals.push(shoal);
  }
}

function updateAndDrawFish() {
  // Maintain trail points from finger path
  if (mouse.active && mouseTrail.length > 0) {
    const last = mouseTrail[mouseTrail.length - 1];
    // Add point if moved enough from last trail point
    if (trailPoints.length === 0 ||
        Math.abs(last.x - trailPoints[trailPoints.length-1].x) > 8 ||
        Math.abs(last.y - trailPoints[trailPoints.length-1].y) > 8) {
      trailPoints.push({ x: last.x, y: last.y, age: 0 });
    }
  }
  // Age and remove old trail points (fade after ~8 seconds)
  for (let i = trailPoints.length - 1; i >= 0; i--) {
    trailPoints[i].age++;
    if (trailPoints[i].age > 480) { trailPoints.splice(i, 1); }
  }
  // Cap trail length
  if (trailPoints.length > 200) trailPoints.splice(0, trailPoints.length - 200);

  for (const shoal of fishShoals) {
    for (const f of shoal) { f.update(shoal); }
    for (const f of shoal) { f.draw(); }
  }
}

// ═══════════════════════════════════════════
//  MOUSE TRAIL
// ═══════════════════════════════════════════
function drawMouseTrail() {
  if (mouseTrail.length < 2) return;
  for (let i = 1; i < mouseTrail.length; i++) {
    const p = mouseTrail[i], prev = mouseTrail[i-1];
    const t = i / mouseTrail.length;
    const a = t * 0.35 * globalDim;
    ctx.beginPath(); ctx.moveTo(prev.x, prev.y); ctx.lineTo(p.x, p.y);
    ctx.strokeStyle = `rgba(130,200,255,${a})`; ctx.lineWidth = t * 14; ctx.lineCap = 'round'; ctx.stroke();
    ctx.strokeStyle = `rgba(80,170,255,${a*0.2})`; ctx.lineWidth = t * 40; ctx.stroke();
  }
  if (mouse.active) {
    const g = ctx.createRadialGradient(mouse.x,mouse.y,0,mouse.x,mouse.y,100);
    g.addColorStop(0, `rgba(120,180,255,${0.1*globalDim})`);
    g.addColorStop(1, 'rgba(100,160,240,0)');
    ctx.beginPath(); ctx.arc(mouse.x,mouse.y,100,0,Math.PI*2); ctx.fillStyle=g; ctx.fill();
  }
}

// ═══════════════════════════════════════════
//  BREATHING ORB
// ═══════════════════════════════════════════
function drawBreathingOrb(bv) {
  const cx=W/2, cy=H/2, baseR=Math.min(W,H)*0.09;
  const r = baseR * (0.7 + bv * 0.6);
  const a = (0.02 + bv * 0.03) * globalDim;
  // halo
  const g2 = ctx.createRadialGradient(cx,cy,0,cx,cy,r*3);
  g2.addColorStop(0, `rgba(80,140,220,${a*0.25})`);
  g2.addColorStop(1, 'rgba(60,100,180,0)');
  ctx.beginPath(); ctx.arc(cx,cy,r*3,0,Math.PI*2); ctx.fillStyle=g2; ctx.fill();
  // core
  const g = ctx.createRadialGradient(cx,cy,0,cx,cy,r);
  g.addColorStop(0, `rgba(120,180,245,${a*1.3})`);
  g.addColorStop(0.5, `rgba(80,130,200,${a*0.5})`);
  g.addColorStop(1, 'rgba(60,100,180,0)');
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fillStyle=g; ctx.fill();
}

// ═══════════════════════════════════════════
//  BACKGROUND
// ═══════════════════════════════════════════
function drawBg() {
  const grad = ctx.createLinearGradient(0,0,0,H);
  const d = globalDim;
  grad.addColorStop(0, `rgb(${(8*d)|0},${(16*d)|0},${(38*d)|0})`);
  grad.addColorStop(0.5, `rgb(${(4*d)|0},${(10*d)|0},${(28*d)|0})`);
  grad.addColorStop(1, `rgb(${(2*d)|0},${(4*d)|0},${(14*d)|0})`);
  ctx.fillStyle = grad; ctx.fillRect(0,0,W,H);
  // vignette
  const vg = ctx.createRadialGradient(W/2,H/2,Math.min(W,H)*0.25,W/2,H/2,Math.max(W,H)*0.7);
  vg.addColorStop(0, 'rgba(0,0,0,0)');
  vg.addColorStop(1, `rgba(0,0,0,${0.35+(1-d)*0.5})`);
  ctx.fillStyle = vg; ctx.fillRect(0,0,W,H);
}

// ═══════════════════════════════════════════
//  INTERACTION
// ═══════════════════════════════════════════
let rippleTimer = 0;
function onMove(e) {
  e.preventDefault();
  const x = e.clientX ?? e.touches?.[0]?.clientX;
  const y = e.clientY ?? e.touches?.[0]?.clientY;
  if (x == null) return;
  mouse.x = x; mouse.y = y; mouse.active = true;
  lastInteraction = performance.now();
  mouseTrail.push({x,y});
  if (mouseTrail.length > 22) mouseTrail.shift();
  if (++rippleTimer % 10 === 0) ripples.push(new Ripple(x,y));
  // keep trying to start audio on every touch
  if (!audioStarted) ensureAudio();
}
function onEnd() { mouse.active = false; }

canvas.addEventListener('mousemove', onMove);
canvas.addEventListener('touchmove', onMove, {passive:false});
canvas.addEventListener('touchstart', e => { e.preventDefault(); onMove(e); ensureAudio(); }, {passive:false});
canvas.addEventListener('mousedown', e => { mouse.active=true; lastInteraction=performance.now(); ripples.push(new Ripple(e.clientX,e.clientY)); ensureAudio(); });
canvas.addEventListener('mouseup', onEnd);
canvas.addEventListener('touchend', onEnd);

// ═══════════════════════════════════════════
//  START
// ═══════════════════════════════════════════
const overlay = document.getElementById('start-overlay');
function startGame() {
  if (started) return;
  started = true;
  // FORCE audio on this user gesture
  ensureAudio();
  overlay.style.opacity = '0';
  setTimeout(() => overlay.style.display = 'none', 3000);
  startTime = lastInteraction = performance.now();
  for (let i = 0; i < 90; i++) particles.push(new Particle());
  for (let i = 0; i < 9; i++) jellyfish.push(new Jellyfish());
  initFish();
  animate();
}
overlay.addEventListener('click', startGame);
overlay.addEventListener('touchstart', e => { e.preventDefault(); startGame(); }, {passive:false});

// ═══════════════════════════════════════════
//  MAIN LOOP
// ═══════════════════════════════════════════
function animate() {
  requestAnimationFrame(animate);
  const now = performance.now();
  const elapsed = (now - startTime) / 1000;
  const sinceInput = (now - lastInteraction) / 1000;

  breathCycle = Math.min(12, 6 + elapsed * 0.0004);
  breathPhase += (Math.PI * 2) / (breathCycle * 60);
  const bv = Math.sin(breathPhase) * 0.5 + 0.5;

  const tp = Math.min(1, Math.max(0, (elapsed/60 - 4) / 16));
  const td = 1 - tp * 0.75;
  const id = sinceInput > 40 ? Math.max(0.08, 1 - (sinceInput - 40) / 90) : 1;
  globalDim = td * id;

  drawBg();
  drawBreathingOrb(bv);
  for (const p of particles) { p.update(bv); p.draw(); }
  for (const j of jellyfish) { j.update(); j.draw(); }
  updateAndDrawFish();
  ripples = ripples.filter(r => { r.draw(); return r.update(); });
  drawMouseTrail();
  if (!mouse.active && mouseTrail.length > 0) mouseTrail.shift();
}
</script>
</body>
</html>
